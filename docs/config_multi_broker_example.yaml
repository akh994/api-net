# Multi-Broker Configuration Example
# Scenario:
# 1. Consumer topic A & subscription B listen rabbitmq host 1
# 2. Consumer topic C & subscription B listen rabbitmq host 2
# 3. Consumer topic D & subscription B listen pubsub host 1
# 4. Publisher topic A connect rabbitmq host 1
# 5. Publisher topic C connect rabbitmq host 2
# 6. Publisher topic D connect pubsub host 1

# ============================================================================
# MESSAGE PUBLISHERS
# ============================================================================
message_publishers:
  
  # 4. Publisher for Topic A (RabbitMQ Host 1)
  topic_a:
    name: "topic-A"
    type: "rabbitmq"
    # Uses general defaults
    
  # 5. Publisher for Topic C (RabbitMQ Host 2)
  topic_c:
    name: "topic-C"
    type: "rabbitmq"
    mq_config:
      host: "rabbitmq-host-2"  # Host 2
      port: 5672
      username: "user2"
      password: "password2"
      queue_type: "quorum" # Different operational settings

  # 6. Publisher for Topic D (PubSub Host 1)
  topic_d:
    name: "topic-D"
    type: "pubsub"
    
  general_mq_config:
    # RabbitMQ Publisher Configuration
    rabbitmq:
      host: "localhost"
      port: 5672
      username: "guest"  # Default RabbitMQ credentials
      password: "guest"  # Default RabbitMQ credentials
      message_ttl: 2
      queue_expiration: 3
      enable_dlq: true  # Enable Dead Letter Queue (DLQ)
      max_retries: 5  # Max retries before sending to DLQ
      queue_type: "classic"  # Options: classic, quorum
      concurrent_consumers: 5
    
    # Kafka Publisher Configuration
    kafka:
      brokers:
        - "localhost:9092"
      username: ""
      password: ""
      client_id: "skeleton-api-net-publisher"
      compression: "snappy"
      max_retries: 5
      acks: "all"
      compression_level: 0
      max_message_bytes: 1048576
   
    # PubSub Publisher Configuration
    pubsub:
      credentials: "credentials/service-account.json"
      project_id: "your-project-id"
      max_retries: 5
      timeout_seconds: 10
   
    # MQTT Publisher Configuration
    mqtt:
      broker: "tcp://localhost:1883"  # MQTT broker URL (use ssl://host:port for TLS)
      client_id: "skeleton-api-net-publisher"
      username: ""
      password: ""
      keep_alive_seconds: 60
      qos: 1
      retained: false
      max_retries: 5


# ============================================================================
# MESSAGE CONSUMERS
# ============================================================================
message_consumers:
  subscription: "subscription-B"
  
  topics:
    # 1. Consumer for Topic A
    topic_a:
      name: "topic-A"
      type: "rabbitmq"
    
    # 2. Consumer for Topic C (RabbitMQ Host 2)
    topic_c:
      name: "topic-C"
      type: "rabbitmq"
      mq_config:
        host: "rabbitmq-host-2"  # Host 2
        port: 5672
        username: "user2"
        password: "password2"
        queue_type: "quorum"

    # 3. Consumer for Topic D (PubSub Host 1)
    topic_d:
      name: "topic-D"
      type: "pubsub"

  general_mq_config:
    # RabbitMQ Consumer Configuration
    rabbitmq:
      host: "localhost"
      port: 5672
      username: "guest"
      password: "guest"
      message_ttl: 2
      queue_expiration: 3
      enable_dlq: true
      max_retries: 5
      queue_type: "classic"
      concurrent_consumers: 5
    
    # Kafka Consumer Configuration
    kafka:
      brokers:
        - "localhost:9092"
      username: ""
      password: ""
      group_id: "skeleton-api-net-consumer-group"
      auto_offset_reset: "latest"
      concurrent_consumers: 3
    
    # PubSub Consumer Configuration
    pubsub:
      credentials: "credentials/service-account.json"
      project_id: "your-project-id"
      create_subscription: true
      concurrent_consumers: 5
      ack_deadline_seconds: 10
   
    # MQTT Consumer Configuration
    mqtt:
      broker: "tcp://localhost:1883"
      client_id: "skeleton-api-net-consumer"
      username: ""
      password: ""
      clean_session: true
      keep_alive_seconds: 60
      qos: 1
      concurrent_consumers: 5