syntax = "proto3";
package athlete;
option csharp_namespace = "AthleteManagement.Protos";

service AthleteService {
  rpc GetAthlete(GetAthleteRequest) returns (AthleteResponse);
  rpc AddAthleteGroup(AddAthleteGroupRequest) returns (AthleteResponse);
}

message GetAthleteRequest {
  string id = 1;
}

message AddAthleteGroupRequest {
  string group_name = 1;
}

message AthleteResponse {
  string id = 1;
  string name = 2;
  string email = 3;
}
