syntax = "proto3";

package orderplanning;

option go_package = "OrderPlanning/proto";

import public "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";


service OrderPlanningGrpcService {
  rpc HealthCheck (google.protobuf.Empty) returns (HealthCheckResp) {
    option (google.api.http) = {
      get: "/v1/health"
    };
  };
  rpc GetMaster (google.protobuf.Empty) returns (GetMasterResponse) {
    option (google.api.http) = {
      get: "/v1/master"
    };
  };
  rpc GetOrderDetail (GetOrderDetailRequest) returns (GetOrderDetailResponse) {
    option (google.api.http) = {
      get: "/v1/order/{order_id}"
    };
  };
  rpc GetOrderList (GetOrderListRequest) returns (GetOrderListResponse) {
    option (google.api.http) = {
      post: "/v1/orders/list",
      body: "*"
    };
  };
  rpc ManualAssign (ManualAssignRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/order/manual-assign",
      body: "*"
    };
  };
  rpc TransferPlanning (TransferPlanningRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/order/transfer",
      body: "*"
    };
  };

  rpc DispatchOrderAssign (DispatchOrderAssignRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/order/dispatch",
      body: "*"
    };
  };  

  rpc AssignedOffer (AssignedOfferRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/order/assigned-offer",
      body: "*"
    };
  };
  rpc GetOrderListPlanning (GetOrderListPlanningRequest) returns (GetOrderListPlanningResponse) {
    option (google.api.http) = {
      post: "/v1/orders/planning",
      body: "*"
    };
  };
  rpc GetOrderDetailPlanning (GetOrderDetailPlanningRequest) returns (GetOrderDetailPlanningResponse) {
    option (google.api.http) = {
      get: "/v1/order/planning/{order_id}"
    };
  };
  rpc DriverConfirm (DriverConfirmRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/order/driver-confirm",
      body: "*"
    };
  };
  rpc SetAutoDispatch (SetAutoDispatchRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/v1/order/auto-dispatch",
      body: "*"
    };
  };
  rpc SetGage (SetGageRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/v1/order/gage",
      body: "*"
    };
  };

  rpc CleanUpOrder (CleanUpOrderRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/order/cleanup",
      body: "*"
    };
  };

  rpc EditCustomerEmail (EditCustomerEmailRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/v1/order/customer-email",
      body: "*"
    };
  };
  rpc GetBookingDetail (GetBookingDetailRequest) returns (GetBookingDetailResponse) {
    option (google.api.http) = {
      get: "/v1/booking/{booking_no}/{order_id}"
    };
  };
  rpc GetBookingList(GetBookingListRequest) returns (GetBookingListResponse) {
    option (google.api.http) = {
      get: "/v1/bookings/list"
    };
  };
}


message GetBookingDetailRequest {
  string booking_no = 1;
  string order_id = 2;
}

message CleanUpOrderRequest {
  repeated string driver_id = 1;
}

message SetGageRequest {
  int64 order_id = 1;
  bool gage = 2;
}

message SetAutoDispatchRequest {
  int64 order_id = 1;
  bool auto_dispatch = 2; 
}

message GetOrderDetailPlanningRequest {
    string order_id = 1;
}

message GetOrderDetailPlanningResponse {
    GetOrderDetailPlanningData data = 1;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_CONFIRMED = 2;
  ORDER_STATUS_COMPLETED = 3;
  ORDER_STATUS_CANCELLED = 4;
}

message GetOrderDetailPlanningData {
    string                    id = 1 ;
    string                    order_no = 2 ;
    int32                     item_no = 3;
    string                    customer_name = 4 ;
    string                    customer_phone = 5 ;
    string                    pickup_point = 6;
    google.protobuf.Timestamp pickup_time = 7 ;
    string                    drop_point = 8;
    string                    order_type = 9;
    string                    payment_type = 10;
    string                    payment_method = 11;
    string                    notes = 12 ;
    bool                      confirmed = 13 ;  
    string                    pickup_point_name = 14;
    string                    pembayar_tagih = 15;
    double                    total_tarif = 16;
    bool                      show_info_toll = 17;
    int32                     status_tagih_toll = 18;
    int32                     deposit_toll = 19;
    bool                      show_info_pickup = 20;
    OrderStatus               order_status = 21;
}
  
message AssignedOfferRequest {
  int64 order_id = 1;
  string order_number = 2;
  VehicleData vehicle = 3;
  bool is_multi_assigned = 4;
}

message GetOrderListPlanningRequest {
