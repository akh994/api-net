# SonarQube Project Configuration for skeleton-api-net

# Project identification
sonar.projectKey=skeleton-api-net
sonar.projectName=skeleton-api-net
sonar.projectVersion=1.0

# Source code location
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusions - files/directories not to analyze
sonar.exclusions=\
    **/bin/**,\
    **/obj/**,\
    **/proto/**,\
    **/deployments/**,\
    **/migrations/**,\
    **/*.Designer.cs,\
    **/Program.cs,\
    **/Startup.cs

# Coverage exclusions - files not included in coverage reports
sonar.coverage.exclusions=\
    **/bin/**,\
    **/obj/**,\
    **/proto/**,\
    **/deployments/**,\
    **/migrations/**,\
    **/*.Designer.cs,\
    **/Program.cs,\
    **/Startup.cs,\
    **/tests/**

# .NET specific settings
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/*.trx

# Test execution settings
sonar.test.inclusions=**/tests/**/*.cs
sonar.test.exclusions=**/bin/**,**/obj/**

# Language
sonar.language=cs
